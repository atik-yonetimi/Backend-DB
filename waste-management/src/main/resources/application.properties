spring.application.name=waste-management
server.port=8080
springdoc.swagger-ui.path=/swagger-ui.html

spring.datasource.url=jdbc:postgresql://localhost:5432/atik_yonetimi

spring.datasource.url=jdbc:postgresql://localhost:5432/atik_yonetimi?stringtype=unspecified

